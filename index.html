<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Agent AI</title>
    
    <style>
        body {
            background-color: #f4f4f9; /* Jasne tło dla całej strony klienta */
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 1. PRZYCISK OTWIERAJĄCY CZAT (Floating Button) */
        .chat-launcher {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #00adb5;
            border-radius: 50%;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            color: white;
            font-size: 30px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            z-index: 1000;
        }
        .chat-launcher:hover {
            transform: scale(1.1); /* Efekt lekkiego powiększenia po najechaniu myszką */
        }

        /* 2. UKRYTE OKNO CZATU */
        .chat-container {
            position: fixed;
            bottom: 90px; /* Wyżej niż przycisk, żeby na siebie nie nachodziły */
            right: 20px;
            background-color: #1e1e1e;
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 25px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 350px;
            z-index: 1000;
            
            /* Domyślnie ukrywamy czat */
            display: none; 
        }

        /* Klasa, którą dodamy przez JavaScript, żeby pokazać czat */
        .chat-container.active {
            display: block;
        }

        h2 { text-align: center; margin-top: 0; color: #00adb5; font-size: 18px; }
        
        .chat-box {
            background-color: #252525;
            padding: 10px;
            border-radius: 10px;
            height: 250px; /* Trochę wyższy czat, bo na kompie jest miejsce */
            overflow-y: auto; /* Suwak, gdy wiadomości będzie za dużo */
            margin-bottom: 15px;
        }
        
        .chat-input-area {
            display: flex;
            justify-content: space-between;
        }

        input {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
        }
        
        button.send-btn {
            width: 25%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #00adb5;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Udawana strona klienta (żeby było widać, jak bot wtapia się w tło) -->
    <h1>Witaj na mojej profesjonalnej stronie!</h1>
    <p>Przeglądasz właśnie ofertę super usług. Spójrz w prawy dolny róg...</p>

    <!-- PRZYCISK DO KLIKANIA -->
    <button class="chat-launcher" id="launcherBtn">🤖</button>

    <!-- OKIENKO CZATU -->
    <div class="chat-container" id="chatWindow">
      <h2>Mój Agent Edukacyjny 🤖</h2>
      <div class="chat-box" id="chatBox">
        <p><strong>Agent:</strong> Cześć! Jestem Twoim asystentem. O co chcesz zapytać? (Wpisz np. html, css, kasa)</p>
      </div>
      <div class="chat-input-area">
          <input type="text" id="userInput" placeholder="Wpisz pytanie...">
          <button class="send-btn" id="sendBtn">Wyślij</button>
      </div>
    </div>

    <script>
        const launcherBtn = document.getElementById('launcherBtn');
        const chatWindow = document.getElementById('chatWindow');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        // FUNKCJA: Otwieranie / Zamykanie okna czatu
        launcherBtn.addEventListener('click', () => {
            chatWindow.classList.toggle('active');
        });

        // ⚠️ TUTAJ WKLEJ SWÓJ TAJNY KLUCZ API Z GOOGLE AI STUDIO między cudzysłowy:
        const API_KEY = "AQ.Ab8RN6LPR1mf8chbU64Eon9nLSXOyCbxaWJAPSSroiIM7ya_cg";

// FUNKCJA: Wysyłanie wiadomości do PRAWDZIWEGO AI
        sendBtn.addEventListener('click', async () => {
          const tekst = userInput.value;
          if (tekst.trim() === '') return;

          // 1. Dodajemy wiadomość użytkownika do okienka czatu
          chatBox.innerHTML += `<p><strong>Ty:</strong> ${tekst}</p>`;
          userInput.value = '';
          chatBox.scrollTop = chatBox.scrollHeight;

          // 2. Dodajemy tymczasowy napis "Pisze...", żeby użytkownik wiedział, że AI myśli
          const loadingId = "loading-" + Date.now();
          chatBox.innerHTML += `<p id="${loadingId}" style="color: #888;"><strong>Agent:</strong> Pisze...</p>`;
          chatBox.scrollTop = chatBox.scrollHeight;

          try {
            // 3. ODPOWIEDNI ADRES DLA DARMOWYCH KLUCZY + NOWY MODEL GEMINI 2.0 FLASH
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{ text: tekst }]
                }]
              })
            });

            // 4. Odbieramy paczkę danych i tłumaczymy ją na format czytelny dla JavaScriptu
            const data = await response.json();
            
            // 5. Usuwamy napis "Pisze..." bo odpowiedź już przyszła
            if (document.getElementById(loadingId)) {
                document.getElementById(loadingId).remove();
            }

            // Sprawdzamy, czy Google nie przysłało błędu w paczce danych
            if (data.error) {
                chatBox.innerHTML += `<p style="color: #ff5555;"><strong>Agent:</strong> Google mówi: ${data.error.message}</p>`;
                return;
            }

            // 6. Wyciągamy z wielkiej paczki danych od Google ten jeden konkretny tekst odpowiedzi AI
            const odpowiedzAI = data.candidates[0].content.parts[0].text;

            // 7. Wrzucamy odpowiedź sztucznej inteligencji do okienka czatu
            chatBox.innerHTML += `<p style="color: #00adb5;"><strong>Agent:</strong> ${odpowiedzAI}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;

          } catch (error) {
            // Jeśli coś pójdzie nie tak, kasujemy animację i pokazujemy błąd
            if (document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<p style="color: #ff5555;"><strong>Agent:</strong> Sorki, mordo, coś poszło nie tak z połączeniem z AI. Sprawdź konsolę (F12).</p>`;
            console.error(error);
          }
        });
    </script>
</body>
</html>
